# Optional stack: editable install with SHAP for FeedbackDecider; keeps CI green if wheels fail.

name: CI (explain extra)

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test-explain:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            blowfish/requirements.txt
            blowfish/requirements-explain.txt
            requirements-dev.txt

      - name: Install with explain extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e ".[explain]"

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

      - name: Smoke import FeedbackDecider
        run: python -c "from blowfish.inference import FeedbackDecider; print('ok')"
